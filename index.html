<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Шпаргалка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      padding: 20px;
      background: #161b22;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .hidden { display: none !important; }
    
    /* Login */
    #login {
      text-align: center;
      padding: 40px 20px;
    }
    #login input {
      display: block;
      margin: 12px auto;
      padding: 12px 18px;
      width: 260px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 16px;
    }
    #login button {
      padding: 12px 40px;
      border: none;
      border-radius: 8px;
      background: #238636;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    #login button:hover { background: #2ea043; }
    #login .error {
      color: #f85149;
      margin-top: 12px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 12px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #8b949e;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn:hover { background: #1f242f; color: #e6edf3; }
    .tab-btn.active {
      background: #1f242f;
      color: #e6edf3;
      border-bottom: 2px solid #238636;
    }

    .tab-content {
      display: none;
      background: #0d1117;
      padding: 20px;
      border-radius: 12px;
    }
    .tab-content.active { display: block; }

    .tab-content h2 {
      color: #f0f6fc;
      margin-bottom: 16px;
      font-size: 22px;
    }

    .tab-content h3 {
      color: #f0f6fc;
      margin: 24px 0 12px 0;
      font-size: 18px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 6px;
    }

    .desc {
      color: #8b949e;
      margin: 8px 0 12px 0;
      font-size: 15px;
    }

    .cmd-block {
      background: #0d1117;
      border-radius: 8px;
      border: 1px solid #30363d;
      padding: 12px 50px 12px 16px;
      margin: 4px 0 8px 0;
      position: relative;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #e6edf3;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .cmd-block .comment {
      color: #8b949e;
      font-size: 13px;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: #1f242f;
      border: none;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .copy-btn:hover { background: #30363d; color: #e6edf3; }

    .note {
      background: #1f242f;
      border-left: 3px solid #238636;
      padding: 10px 16px;
      margin: 12px 0;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
    }
    .note code {
      background: #0d1117;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 16px 0;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #30363d;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background: #1f242f;
      color: #f0f6fc;
    }
    td {
      color: #e6edf3;
    }
    td code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <!-- LOGIN -->
  <div id="login">
    <h1 style="margin-bottom: 8px;">🔐 DevOps Шпаргалка</h1>
    <p style="color: #8b949e; margin-bottom: 24px;">Введите логин и пароль</p>
    <input type="text" id="loginUser" placeholder="Логин" value="devops">
    <input type="password" id="loginPass" placeholder="Пароль" value="123">
    <button onclick="login()">Войти</button>
    <div id="loginError" class="error hidden">Неверный логин или пароль</div>
  </div>

  <!-- MAIN -->
  <div id="main" class="hidden">
    <div class="tabs" id="tabHeaders"></div>
    <div id="tabContents"></div>
  </div>
</div>
