<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Шпаргалка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      padding: 20px;
      background: #161b22;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .hidden { display: none !important; }
    
    #login {
      text-align: center;
      padding: 40px 20px;
    }
    #login input {
      display: block;
      margin: 12px auto;
      padding: 12px 18px;
      width: 260px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 16px;
    }
    #login button {
      padding: 12px 40px;
      border: none;
      border-radius: 8px;
      background: #238636;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    #login button:hover { background: #2ea043; }
    #login .error {
      color: #f85149;
      margin-top: 12px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 12px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #8b949e;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn:hover { background: #1f242f; color: #e6edf3; }
    .tab-btn.active {
      background: #1f242f;
      color: #e6edf3;
      border-bottom: 2px solid #238636;
    }

    .tab-content {
      display: none;
      background: #0d1117;
      padding: 20px;
      border-radius: 12px;
    }
    .tab-content.active { display: block; }

    .tab-content h2 {
      color: #f0f6fc;
      margin-bottom: 16px;
      font-size: 22px;
    }
    .tab-content h3 {
      color: #f0f6fc;
      margin: 24px 0 12px 0;
      font-size: 18px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 6px;
    }
    .desc {
      color: #8b949e;
      margin: 8px 0 12px 0;
      font-size: 15px;
    }
    .cmd-block {
      background: #0d1117;
      border-radius: 8px;
      border: 1px solid #30363d;
      padding: 12px 50px 12px 16px;
      margin: 4px 0 8px 0;
      position: relative;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #e6edf3;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .cmd-block .comment {
      color: #8b949e;
      font-size: 13px;
    }
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: #1f242f;
      border: none;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .copy-btn:hover { background: #30363d; color: #e6edf3; }
    .note {
      background: #1f242f;
      border-left: 3px solid #238636;
      padding: 10px 16px;
      margin: 12px 0;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
    }
    .note code {
      background: #0d1117;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 16px 0;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #30363d;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background: #1f242f;
      color: #f0f6fc;
    }
    td {
      color: #e6edf3;
    }
    td code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .loading {
      text-align: center;
      color: #8b949e;
      padding: 40px 0;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-header .edit-link {
      color: #58a6ff;
      font-size: 14px;
      text-decoration: none;
    }
    .section-header .edit-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <!-- LOGIN -->
  <div id="login">
    <h1 style="margin-bottom: 8px;">🔐 DevOps Шпаргалка</h1>
    <p style="color: #8b949e; margin-bottom: 24px;">Введите логин и пароль</p>
    <input type="text" id="loginUser" placeholder="Логин" value="devops">
    <input type="password" id="loginPass" placeholder="Пароль" value="123">
    <button onclick="doLogin()">Войти</button>
    <div id="loginError" class="error hidden">Неверный логин или пароль</div>
  </div>

  <!-- MAIN -->
  <div id="main" class="hidden">
    <div class="tabs" id="tabHeaders"></div>
    <div id="tabContents">
      <div class="loading">Загрузка шпаргалок...</div>
    </div>
  </div>
</div>

<script>
  // ========================================================
  // 1. Логин и пароль (можно поменять здесь)
  // ========================================================
  var LOGIN = 'devops';
  var PASSWORD = '123';

  // ========================================================
  // 2. Список секций (шпаргалок) и их файлы на GitHub
  // ========================================================
  // ВАЖНО: замени "mob9251342093-png" на свой GitHub логин,
  // если он отличается!
  var GITHUB_USER = 'mob9251342093-png';
  var REPO_NAME = 'devops-cheatsheet';
  var BRANCH = 'main';

  // Здесь перечислены все шпаргалки. 
  // Чтобы добавить новую — допиши объект в конец списка:
  // { id: 'ansible', label: '🔧 Ansible', file: 'ansible.md' },
  var SECTIONS = [
    { id: 'docker', label: '🐳 Docker', file: 'docker.md' },
    { id: 'linux', label: '🐧 Linux', file: 'linux.md' },
    { id: 'git', label: '📦 Git', file: 'git.md' },
    { id: 'postgres', label: '🐘 PostgreSQL', file: 'postgres.md' },
    { id: 'cicd', label: '🔄 CI/CD', file: 'cicd.md' },
    { id: 'ssh', label: '🔒 SSH', file: 'ssh.md' }
  ];

  // ========================================================
  // 3. Функция загрузки содержимого с GitHub
  // ========================================================
  function loadSectionContent(section, callback) {
    var url = 'https://raw.githubusercontent.com/' + GITHUB_USER + '/' + REPO_NAME + '/' + BRANCH + '/sections/' + section.file;
    fetch(url)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Не удалось загрузить ' + section.file + ' (HTTP ' + response.status + ')');
        }
        return response.text();
      })
      .then(function(text) {
        // Преобразуем Markdown в HTML
        var html = convertMarkdownToHtml(text);
        callback(null, html);
      })
      .catch(function(error) {
        callback(error, null);
      });
  }

  // ========================================================
  // 4. Конвертер Markdown → HTML (простой, для наших шпаргалок)
  // ========================================================
  function convertMarkdownToHtml(md) {
    // Заголовки
    var html = md
      .replace(/^### (.*$)/gim, '<h3>$1</h3>')
      .replace(/^## (.*$)/gim, '<h2>$1</h2>')
      .replace(/^# (.*$)/gim, '<h1>$1</h1>')
      // Блоки кода (```bash ... ```)
      .replace(/```bash([\s\S]*?)```/g, function(match, code) {
        var lines = code.trim().split('\n');
        var htmlLines = lines.map(function(line) {
          // Если строка начинается с команды, обрабатываем
          var trimmed = line.trim();
          if (trimmed.startsWith('#') || trimmed.startsWith('//')) {
            return '<div class="cmd-block"><span class="comment">' + trimmed + '</span></div>';
          }
          // Проверяем, есть ли комментарий через #
          if (trimmed.includes(' # ')) {
            var parts = trimmed.split(' # ');
            var cmd = parts[0];
            var comment = parts.slice(1).join(' # ');
            return '<div class="cmd-block">' + cmd + ' <span class="comment"># ' + comment + '</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>';
          }
          return '<div class="cmd-block">' + trimmed + '<button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>';
        });
        return htmlLines.join('');
      })
      // Таблицы (упрощённо)
      .replace(/\|(.+)\|/g, function(match, row) {
        var cells = row.split('|').map(function(c) { return c.trim(); });
        var isHeader = false;
        // Проверяем, не является ли строка разделителем (|---|---|)
        if (cells.every(function(c) { return /^[-:]+$/.test(c); })) {
          return '';
        }
        // Если все ячейки содержат заголовки (не пустые и не разделители)
        if (cells.length > 1 && !cells.some(function(c) { return /^[-:]+$/.test(c); })) {
          isHeader = true;
        }
        var tag = isHeader ? 'th' : 'td';
        var tr = '<tr>' + cells.map(function(c) { return '<' + tag + '>' + c + '</' + tag + '>'; }).join('') + '</tr>';
        return tr;
      })
      // Обычный текст
      .replace(/^\*\*(.*)\*\*$/gim, '<strong>$1</strong>')
      .replace(/^\*(.*)\*$/gim, '<em>$1</em>')
      // Ссылки [текст](url)
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
      // Списки
      .replace(/^- (.*)$/gim, '<li>$1</li>')
      // Заменяем переносы строк на <br> для обычного текста
      .replace(/\n/g, '<br>');

    // Оборачиваем списки в <ul>
    html = html.replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');
    // Убираем дублирование ul
    html = html.replace(/<\/ul>\s*<ul>/g, '');

    return html;
  }

  // ========================================================
  // 5. Рендеринг сайта
  // ========================================================
  function renderTabs() {
    var container = document.getElementById('tabHeaders');
    container.innerHTML = '';
    for (var i = 0; i < SECTIONS.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.setAttribute('data-tab', SECTIONS[i].id);
      btn.textContent = SECTIONS[i].label;
      btn.onclick = (function(id) {
        return function() { switchTab(id); };
      })(SECTIONS[i].id);
      container.appendChild(btn);
    }
  }

  function renderContent(activeId) {
    if (!activeId) activeId = SECTIONS[0].id;
    var container = document.getElementById('tabContents');
    container.innerHTML = '<div class="loading">Загрузка...</div>';

    // Загружаем все секции последовательно
    var loaded = {};
    var total = SECTIONS.length;
    var loadedCount = 0;

    SECTIONS.forEach(function(section) {
      loadSectionContent(section, function(err, html) {
        loadedCount++;
        if (err) {
          html = '<div class="desc" style="color:#f85149;">❌ Ошибка загрузки: ' + err.message + '</div>';
        }
        loaded[section.id] = html;

        // Когда все загружены — рендерим
        if (loadedCount === total) {
          var contentContainer = document.getElementById('tabContents');
          contentContainer.innerHTML = '';
          for (var i = 0; i < SECTIONS.length; i++) {
            var div = document.createElement('div');
            div.className = 'tab-content' + (SECTIONS[i].id === activeId ? ' active' : '');
            div.id = 'tab-' + SECTIONS[i].id;
            div.innerHTML = loaded[SECTIONS[i].id] || '<div class="desc">Пусто</div>';
            contentContainer.appendChild(div);
          }
        }
      });
    });
  }

  function switchTab(id) {
    var btns = document.querySelectorAll('.tab-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.remove('active');
      if (btns[i].getAttribute('data-tab') === id) {
        btns[i].classList.add('active');
      }
    }
    var contents = document.querySelectorAll('.tab-content');
    for (var j = 0; j < contents.length; j++) {
      contents[j].classList.remove('active');
      if (contents[j].id === 'tab-' + id) {
        contents[j].classList.add('active');
      }
    }
  }

  // ========================================================
  // 6. Копирование команды
  // ========================================================
  function copyCmd(btn) {
    var block = btn.parentElement;
    var text = block.textContent.replace('Копировать', '').trim();
    navigator.clipboard.writeText(text);
    btn.textContent = '✅';
    setTimeout(function() {
      btn.textContent = 'Копировать';
    }, 1200);
  }

  // ========================================================
  // 7. Функция входа
  // ========================================================
  function doLogin() {
    var user = document.getElementById('loginUser').value;
    var pass = document.getElementById('loginPass').value;
    if (user === LOGIN && pass === PASSWORD) {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
      renderTabs();
      renderContent();
    } else {
      document.getElementById('loginError').classList.remove('hidden');
    }
  }
</script>
</body>
</html>
