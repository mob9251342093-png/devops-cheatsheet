<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Шпаргалка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      padding: 20px;
      background: #161b22;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .hidden { display: none !important; }
    
    #login {
      text-align: center;
      padding: 40px 20px;
    }
    #login input {
      display: block;
      margin: 12px auto;
      padding: 12px 18px;
      width: 260px;
      border-radius: 8px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: #e6edf3;
      font-size: 16px;
    }
    #login button {
      padding: 12px 40px;
      border: none;
      border-radius: 8px;
      background: #238636;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }
    #login button:hover { background: #2ea043; }
    #login .error {
      color: #f85149;
      margin-top: 12px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 12px;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #8b949e;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab-btn:hover { background: #1f242f; color: #e6edf3; }
    .tab-btn.active {
      background: #1f242f;
      color: #e6edf3;
      border-bottom: 2px solid #238636;
    }

    .tab-content {
      display: none;
      background: #0d1117;
      padding: 20px;
      border-radius: 12px;
    }
    .tab-content.active { display: block; }

    .tab-content h2 {
      color: #f0f6fc;
      margin-bottom: 16px;
      font-size: 22px;
    }
    .tab-content h3 {
      color: #f0f6fc;
      margin: 24px 0 12px 0;
      font-size: 18px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 6px;
    }
    .desc {
      color: #8b949e;
      margin: 8px 0 12px 0;
      font-size: 15px;
    }
    .cmd-block {
      background: #0d1117;
      border-radius: 8px;
      border: 1px solid #30363d;
      padding: 12px 50px 12px 16px;
      margin: 4px 0 8px 0;
      position: relative;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #e6edf3;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .cmd-block .comment {
      color: #8b949e;
      font-size: 13px;
    }
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: #1f242f;
      border: none;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .copy-btn:hover { background: #30363d; color: #e6edf3; }
    .note {
      background: #1f242f;
      border-left: 3px solid #238636;
      padding: 10px 16px;
      margin: 12px 0;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
    }
    .note code {
      background: #0d1117;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 16px 0;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #30363d;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background: #1f242f;
      color: #f0f6fc;
    }
    td {
      color: #e6edf3;
    }
    td code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <!-- LOGIN -->
  <div id="login">
    <h1 style="margin-bottom: 8px;">🔐 DevOps Шпаргалка</h1>
    <p style="color: #8b949e; margin-bottom: 24px;">Введите логин и пароль</p>
    <input type="text" id="loginUser" placeholder="Логин" value="devops">
    <input type="password" id="loginPass" placeholder="Пароль" value="123">
    <button onclick="login()">Войти</button>
    <div id="loginError" class="error hidden">Неверный логин или пароль</div>
  </div>

  <!-- MAIN -->
  <div id="main" class="hidden">
    <div class="tabs" id="tabHeaders"></div>
    <div id="tabContents"></div>
  </div>
</div>

<script>
  const LOGIN = 'devops';
  const PASSWORD = '123';

  function login() {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    if (user === LOGIN && pass === PASSWORD) {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
      renderTabs();
      renderContent();
    } else {
      document.getElementById('loginError').classList.remove('hidden');
    }
  }

  function renderTabs() {
    const container = document.getElementById('tabHeaders');
    container.innerHTML = '';
    sections.forEach(function(s, i) {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.setAttribute('data-tab', s.id);
      btn.textContent = s.label;
      btn.onclick = function() { switchTab(s.id); };
      container.appendChild(btn);
    });
  }

  function renderContent(activeId) {
    if (!activeId) activeId = sections[0].id;
    const container = document.getElementById('tabContents');
    container.innerHTML = '';
    sections.forEach(function(s) {
      const div = document.createElement('div');
      div.className = 'tab-content' + (s.id === activeId ? ' active' : '');
      div.id = 'tab-' + s.id;
      div.innerHTML = s.content;
      container.appendChild(div);
    });
  }

  function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.remove('active');
    });
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      if (b.getAttribute('data-tab') === id) {
        b.classList.add('active');
      }
    });
    document.querySelectorAll('.tab-content').forEach(function(c) {
      c.classList.remove('active');
    });
    document.getElementById('tab-' + id).classList.add('active');
  }

  function copyCmd(btn) {
    const block = btn.parentElement;
    let text = block.textContent.replace('Копировать', '').trim();
    navigator.clipboard.writeText(text);
    btn.textContent = '✅';
    setTimeout(function() {
      btn.textContent = 'Копировать';
    }, 1200);
  }

  const sections = [
    {
      id: 'docker',
      label: '🐳 Docker',
      content: `
        <h2>ШПАРГАЛКА №1: Docker + Docker Compose</h2>

        <h3>Основные команды Docker</h3>
        <div class="cmd-block">docker --version                    <span class="comment"># версия</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker ps                           <span class="comment"># запущенные контейнеры</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker ps -a                       <span class="comment"># все контейнеры (включая остановленные)</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker images                      <span class="comment"># образы</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker logs &lt;container_name&gt;  <span class="comment"># логи</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker exec -it &lt;container&gt; bash  <span class="comment"># зайти внутрь контейнера</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker stop &lt;container&gt;       <span class="comment"># остановить</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker rm &lt;container&gt;         <span class="comment"># удалить</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker rmi &lt;image&gt;            <span class="comment"># удалить образ</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Docker Compose (самое важное)</h3>
        <div class="cmd-block">docker compose up -d --build      <span class="comment"># собрать и запустить в фоне</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker compose down               <span class="comment"># остановить и удалить контейнеры</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker compose ps                 <span class="comment"># статус сервисов</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker compose logs web           <span class="comment"># логи сервиса web</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker compose logs db --tail=50  <span class="comment"># последние 50 строк логов db</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">docker compose restart web        <span class="comment"># перезапустить один сервис</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Полезные флаги</h3>
        <ul style="color:#e6edf3; margin:8px 0 16px 20px;">
          <li><code style="background:#1f242f;padding:2px 8px;border-radius:4px;">--build</code> — пересобрать образы</li>
          <li><code style="background:#1f242f;padding:2px 8px;border-radius:4px;">-d</code> — в фоне (detached)</li>
          <li><code style="background:#1f242f;padding:2px 8px;border-radius:4px;">--force-recreate</code> — пересоздать контейнеры</li>
        </ul>

        <h3>Когда использовать docker и когда docker compose</h3>
        <table>
          <tr><th>Задача</th><th>Рекомендуемая команда</th><th>Какая команда лучше</th><th>Почему</th></tr>
          <tr><td>Запустить весь проект</td><td><code>docker compose up -d</code></td><td>docker compose</td><td>Запускает все контейнеры по docker-compose.yml</td></tr>
          <tr><td>Остановить весь проект</td><td><code>docker compose down</code></td><td>docker compose</td><td>Останавливает всё, что описано в файле</td></tr>
          <tr><td>Зайти внутрь контейнера</td><td><code>docker exec -it name bash</code></td><td>docker</td><td>exec — базовая команда Docker</td></tr>
          <tr><td>Посмотреть все запущенные контейнеры</td><td><code>docker ps</code></td><td>docker</td><td>Более полная информация</td></tr>
          <tr><td>Удалить все остановленные контейнеры</td><td><code>docker rm -f $(docker ps -aq)</code></td><td>docker</td><td>Когда compose не нужен</td></tr>
        </table>

        <div class="note">💡 <strong>Главное правило:</strong> если у тебя есть <code>docker-compose.yml</code> — используй <code>docker compose</code>. Если запускаешь один контейнер — используй <code>docker</code>.</div>
      `
    },
    {
      id: 'linux',
      label: '🐧 Linux',
      content: `
        <h2>ШПАРГАЛКА №2: Linux (Bash)</h2>
        <div class="desc">Основные команды для работы в терминале</div>

        <h3>Навигация и файлы</h3>
        <div class="cmd-block">ls -la                     <span class="comment"># показать все файлы (включая скрытые)</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">cd /home/devops            <span class="comment"># перейти в папку</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">pwd                        <span class="comment"># показать текущую папку</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">cat file.txt               <span class="comment"># посмотреть содержимое файла</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">tail -f /var/log/app.log  <span class="comment"># следить за логом в реальном времени</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Поиск и анализ</h3>
        <div class="cmd-block">grep "error" app.log       <span class="comment"># найти строки с текстом</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">grep -i "error" app.log   <span class="comment"># поиск без учёта регистра</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">grep -v "info" app.log    <span class="comment"># все строки, КРОМЕ info</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">wc -l app.log              <span class="comment"># количество строк в файле</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Управление системой</h3>
        <div class="cmd-block">chmod +x script.sh && ./script.sh  <span class="comment"># сделать скрипт исполняемым и запустить</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">df -h                     <span class="comment"># свободное место на диске</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">sudo apt update && sudo apt upgrade -y  <span class="comment"># обновить систему</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">systemctl status docker   <span class="comment"># статус сервиса</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">journalctl -u docker -f   <span class="comment"># логи сервиса в реальном времени</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Когда что использовать</h3>
        <table>
          <tr><th>Задача</th><th>Команда</th><th>Почему</th></tr>
          <tr><td>Посмотреть все файлы в папке</td><td><code>ls -la</code></td><td>Показывает права, владельца, размер</td></tr>
          <tr><td>Найти ошибки в логе</td><td><code>grep ERROR app.log</code></td><td>Быстрый поиск по ключевым словам</td></tr>
          <tr><td>Узнать, сколько места осталось на диске</td><td><code>df -h</code></td><td>Показывает в GB/MB</td></tr>
          <tr><td>Перезапустить веб-сервер</td><td><code>sudo systemctl restart nginx</code></td><td>systemctl — стандартный способ управления сервисами</td></tr>
        </table>

        <div class="note">💡 <strong>Главное правило:</strong> Если не знаешь, что делает команда — сначала прочитай документацию: <code>команда --help</code> или <code>man команда</code>.</div>
      `
    },
    {
      id: 'git',
      label: '📦 Git',
      content: `
        <h2>ШПАРГАЛКА №3: Git</h2>
        <div class="desc">Основы контроля версий</div>

        <h3>Основные команды</h3>
        <div class="cmd-block">git init                         <span class="comment"># создать репозиторий</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git add . && git commit -m "msg" <span class="comment"># добавить все и сохранить</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git push -u origin main         <span class="comment"># отправить на GitHub</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git pull                        <span class="comment"># забрать изменения</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git checkout -b new-feature    <span class="comment"># создать ветку и переключиться</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git branch -a                  <span class="comment"># список веток</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git merge feature              <span class="comment"># слить ветку feature в текущую</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git status                     <span class="comment"># статус изменений</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git log --oneline --graph      <span class="comment"># история коммитов</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">git stash                      <span class="comment"># спрятать изменения</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Когда что использовать</h3>
        <table>
          <tr><th>Задача</th><th>Команда</th><th>Почему</th></tr>
          <tr><td>Сделать первый push</td><td><code>git push -u origin main</code></td><td><code>-u</code> связывает локальную и удалённую ветки</td></tr>
          <tr><td>Создать новую ветку</td><td><code>git checkout -b feature</code></td><td>Отдельная ветка для новой фичи</td></tr>
          <tr><td>Обновить код с GitHub</td><td><code>git pull</code></td><td>Забирает изменения из удалённого репозитория</td></tr>
          <tr><td>Посмотреть историю</td><td><code>git log --oneline</code></td><td>Удобно ориентироваться в коммитах</td></tr>
        </table>

        <div class="note">💡 <strong>Главное правило:</strong> <code>git status</code> — лучший друг. Выполняй его перед любыми сложными операциями.</div>
      `
    },
    {
      id: 'postgres',
      label: '🐘 PostgreSQL',
      content: `
        <h2>ШПАРГАЛКА №4: PostgreSQL</h2>
        <div class="desc">Запуск, подключение, бэкап и восстановление</div>

        <h3>Запуск PostgreSQL</h3>
        <div class="cmd-block">docker run -d --name postgres-lab -e POSTGRES_USER=devops -e POSTGRES_PASSWORD=devops123 -e POSTGRES_DB=learning -p 5432:5432 -v postgres_data:/var/lib/postgresql/data postgres:15<button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Подключение к базе</h3>
        <div class="cmd-block">docker exec -it postgres-lab psql -U devops -d learning<button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Команды внутри psql</h3>
        <div class="cmd-block">\\l   <span class="comment"># список всех баз данных</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">\\dt  <span class="comment"># список таблиц</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">\\d employees  <span class="comment"># структура таблицы</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">SELECT * FROM employees;<button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">\\q   <span class="comment"># выход</span><button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Бэкап и восстановление</h3>
        <div class="cmd-block">docker exec postgres-lab pg_dump -U devops learning > backup.sql<button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>
        <div class="cmd-block">cat backup.sql | docker exec -i postgres-lab psql -U devops -d learning<button class="copy-btn" onclick="copyCmd(this)">Копировать</button></div>

        <h3>Когда что использовать</h3>
        <table>
          <tr><th>Задача</th><th>Команда</th><th>Почему</th></tr>
          <tr><td>Запустить PostgreSQL</td><td><code>docker run ... postgres:15</code></td><td>Запускает базу в контейнере с сохранением данных</td></tr>
          <tr><td>Подключиться к базе</td><td><code>docker exec -it postgres-lab psql -U devops -d learning</code></td><td>Интерактивный доступ к БД</td></tr>
          <tr><td>Создать бэкап</td><td><code>docker exec postgres-lab pg_dump -U devops learning > backup.sql</code></td><td>Сохраняет все данные в файл</td></tr>
          <tr><td>Восстановить из бэкапа</td><td><code>cat backup.sql | docker exec -i postgres-lab psql -U devops -d learning</code></td><td>Быстрое восстановление</td></tr>
        </table>

        <div class="note">💡 <strong>Главное правило:</strong> Всегда делай бэкап перед тем, как менять данные в production.</div>
      `
    },
    {
      id: 'cicd',
      label: '🔄 CI/CD',
      content: `
        <h2>ШПАРГАЛКА №5: CI/CD (GitHub Actions)</h2>
        <div class="desc">Автоматическая проверка кода при каждом push</div>

        <h3>Базовый workflow для проверки bash-скриптов</h3>
        <div class="cmd-block" style="white-space:pre-wrap;">name: Check Bash Scripts
on: push
jobs:
  build:
    runs-on: ubuntu-latest
